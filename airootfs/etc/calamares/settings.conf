modules-search: [ local ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - displaymanager
    - networkcfg
    - grubcfg
    - bootloader
    - packages
    - finished

branding: arch-jakib

prompt-install: true

dont-chroot: false

oem-setup: false

disable-cancel: false
