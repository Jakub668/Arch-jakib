name: Build Custom Arch ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install archiso
        run: |
          sudo apt update
          sudo apt install -y archiso git

      - name: Prepare profile
        run: |
          git clone https://github.com/archlinux/archiso
          cp -r archiso/configs/releng myiso
          cp packages.x86_64 myiso/packages.x86_64
          cp customize.sh myiso/airootfs/root/customize.sh
          chmod +x myiso/airootfs/root/customize.sh

      - name: Build ISO
        run: |
          sudo mkarchiso -v myiso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: custom-arch
          path: out/*.iso
