name: Build Arch-Jakib ISO

on:
push:
branches: [ main ]
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Prepare folders
    run: |
      mkdir -p work
      mkdir -p out

  - name: Build ISO
    run: |
      docker run --privileged \
      -v ${{ github.workspace }}:/archiso \
      archlinux:latest \
      /bin/bash -c "
      pacman-key --init
      pacman-key --populate archlinux

      pacman -Syu --noconfirm archiso git

      cd /archiso

      mkarchiso -v -w work -o out .
      "

  - name: Upload ISO
    uses: actions/upload-artifact@v4
    with:
      name: arch-jakib-iso
      path: out/*.iso      with:
        name: arch-jakib-iso
        path: out/*.iso
