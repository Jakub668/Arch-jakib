name: Build CachyOS Kernel

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            bc \
            bison \
            flex \
            libssl-dev \
            libelf-dev \
            git \
            wget \
            rsync

      - name: Prepare kernel
        run: |
          cd linux
          make defconfig

      - name: Build kernel
        run: |
          cd linux
          make -j$(nproc)

      - name: Save kernel
        run: |
          mkdir output
          cp linux/arch/x86/boot/bzImage output/

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-kernel
          path: output/
